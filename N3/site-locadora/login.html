<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../estilo.css">
</head>

<body>
    <header>
        <nav class="navbar mb-4">
            <div class="container-fluid justify-content-start">
                <a href="home.html"><button class="btn btn-outline-secondary me-2" type="button">Início</button></a>
                <a href="showroom.html"><button class="btn btn-outline-secondary" type="button">Nossos
                        veículos</button></a>
            </div>
        </nav>
    </header>

    <main class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
        <div class="container" style="max-width: 450px;">
            <form id="formulario_login" class="shadow p-4 bg-white rounded validar" novalidate>
                <div class="text-center mb-4">
                    <img src="../imagens/icone.png" alt="Logo" style="width: 60px;" class="mb-2">
                    <h4>Acesso ao Sistema</h4>
                    <p class="text-muted small">Identifique-se para gerenciar a locadora.</p>
                </div>

                <div class="mb-3">
                    <label class="form-label">Login</label>
                    <input type="text" id="email_login" class="form-control" placeholder="admin" required>
                    <div class="invalid-feedback">Por favor, insira o login.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password" id="senha_login" class="form-control" placeholder="••••••••" required>
                    <div class="invalid-feedback">A senha é obrigatória.</div>
                </div>

                <div class="forms-footer w-100 mt-3 text-center">
                    <button type="button" id="botao_login" class="btn btn-primary w-100 mb-3">Entrar</button>
                    <p class="small">Ainda não tem acesso? <a href="cadastro.html"
                            class="text-decoration-none">Cadastre-se aqui</a></p>
                </div>

            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app-login.js"></script>
</body>

</html>
