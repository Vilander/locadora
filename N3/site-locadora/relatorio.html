<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório - Categorias Mais Procuradas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../estilo.css" />
</head>

<body>
    <header>
        <nav class="navbar mb-4">
            <div class="container-fluid justify-content-start">
                <a href="home.html"><button class="btn btn-outline-secondary me-2" type="button">Início</button></a>
                <a href="showroom.html"><button class="btn btn-outline-secondary me-2" type="button">Nossos
                        veículos</button></a>
                <a href="usuarios.html"><button class="btn btn-outline-secondary me-2"
                        type="button">Administração</button></a>
                <button class="btn btn-success me-2" type="button">Relatório</button>

                <button class="btn btn-outline-danger ms-auto" type="button" id="btn-sair">Sair</button>
            </div>
        </nav>
    </header>

    <main class="container shadow-sm bg-white p-4 rounded">
        <div class="row mb-4 align-items-center">
            <div class="col">
                <h2><i class="bi bi-bar-chart me-2"></i>Relatório de Categorias Mais Procuradas</h2>
                <p class="text-muted">Estatísticas de reservas por categoria</p>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Categoria</th>
                        <th scope="col">Total de Reservas</th>
                    </tr>
                </thead>
                <tbody class="corpo_relatorio">
                </tbody>
            </table>
        </div>
    </main>

    <script src="app-relatorio.js"></script>
</body>

</html>
