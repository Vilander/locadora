<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../estilo.css">
</head>

<body>
    <main class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="container" style="max-width: 500px;">
            <form id="formulario_autoCadastro" class="shadow p-4 bg-white rounded validar" novalidate>
                <div class="text-center mb-4">
                    <img src="../imagens/icone.png" alt="Logo" style="width: 50px;">
                    <h4>Crie sua Conta</h4>
                    <p class="text-muted small">Preencha os dados para começar a alugar.</p>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" id="cad_nome" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail (Seu login)</label>
                    <input type="email" id="cad_email" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Crie uma Senha</label>
                    <input type="password" id="cad_senha" class="form-control" required>
                </div>

                <button type="button" id="btn-finalizar-cadastro" class="btn btn-primary w-100">Finalizar
                    Cadastro</button>

                <div class="text-center mt-3">
                    <a href="login.html" class="text-decoration-none small">Já tenho conta? Ir para Login</a>
                </div>
            </form>
        </div>
    </main>
    <script src="app-cadastro.js"></script>
</body>

</html>
