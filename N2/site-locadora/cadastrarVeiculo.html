<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Locadora de Veículos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css"
    />
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="../estilo.css" />
  </head>

  <body>
    <nav class="navbar">
      <div id="nav-menu" class="container-fluid justify-content-start">
        <a href="login.html">
          <button class="btn btn-outline-success me-2" type="button">
            Login
          </button>
        </a>

        <button class="btn btn-outline-secondary me-2" type="button">
          Nossas lojas
        </button>

        <a href="showroom.html">
          <button class="btn btn-outline-secondary me-2" type="button">
            Nossos veículos
          </button>
        </a>

        <a href="home.html">
          <button class="btn btn-outline-secondary" type="button">
            Início
          </button>
        </a>
      </div>
    </nav>
    <div class="container">
      <section class="py-3 py-md-5 py-xl-8">
        <div class="container">
          <div class="row">
            <div class="col-12">
              <div
                class="card border border-dark rounded shadow-sm overflow-hidden"
              >
                <div class="card-body p-0">
                  <div class="row gy-3 gy-md-4 gy-lg-0">
                    <div
                      id="fundo-imagem"
                      class="col-12 col-lg-6 bsb-overlay background-position-center background-size-cover"
                      style="
                        --bsb-overlay-opacity: 0.7;
                        background-image: url(../imagens/renault-kwid.png);
                        background-size: cover;
                      "
                    >
                      <div
                        class="row h-100"
                        style="background-color: #0000008c"
                      >
                        <div class="col-12 col-xl-12">
                          <div
                            class="container contact-info-wrapper py-4 py-xl-5"
                          >
                            <h2 class="h1 mb-3 text-light">
                              Cadastro de Veículos
                            </h2>
                            <p
                              class="lead fs-4 text-light opacity-75 mb-4 mb-xxl-5"
                            >
                              Adicione um novo veículo à frota da Locadora!
                            </p>
                            <span class="avisoAtencao"
                              >ATENÇÃO COM AS INFORMAÇÕES:</span
                            >
                            <p
                              class="lead fs-4 text-light opacity-75 mb-4 mb-xxl-5"
                            >
                              Preencha com atenção a placa, a marca e a diária.
                            </p>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="col-12 col-lg-6">
                      <div class="row align-items-lg-center h-100">
                        <div class="col-12 cadVeiculo">
                          <form action="#" id="form-veiculos">
                            <div class="row gy-4 gy-xl-5 p-4 p-xl-5">
                              <div class="col-12 col-md-6 mt-4">
                                <label for="modeloVeic" class="form-label"
                                  >Modelo do Veículo</label
                                >
                                <input
                                  type="text"
                                  class="form-control"
                                  id="modeloVeic"
                                  placeholder="Ex: Onix"
                                />
                              </div>

                              <div class="col-12 col-md-6 mt-4">
                                <label for="marcaVeic" class="form-label"
                                  >Marca</label
                                >
                                <input
                                  type="text"
                                  class="form-control"
                                  id="marcaVeic"
                                  placeholder="Ex: Chevrolet"
                                />
                              </div>

                              <div class="col-12 col-md-6 mt-4">
                                <label for="placaVeic" class="form-label"
                                  >Placa</label
                                >
                                <input
                                  type="text"
                                  class="form-control"
                                  id="placaVeic"
                                  placeholder="Ex: ABC1A23"
                                  maxlength="7"
                                />
                              </div>

                              <div class="col-12 col-md-6 mt-4">
                                <label for="diariaVeic" class="form-label"
                                  >Valor da Diária (R$)</label
                                >
                                <input
                                  type="number"
                                  class="form-control"
                                  id="diariaVeic"
                                  placeholder="Ex: 150.00"
                                  step="0.01"
                                />
                              </div>

                              <div class="col-12 mt-4">
                                <label for="categoriaVeic" class="form-label"
                                  >Categoria</label
                                >
                                <select class="form-select" id="categoriaVeic">
                                  <option value="" selected disabled>
                                    Selecione a categoria...
                                  </option>
                                  <option value="Básico">Básico</option>
                                  <option value="Família">Família</option>
                                  <option value="Luxo">Luxo</option>
                                </select>
                              </div>

                              <div class="col-12 mt-4">
                                <label for="fotoVeic" class="form-label"
                                  >URL da Foto do Veículo</label
                                >
                                <input
                                  type="text"
                                  class="form-control"
                                  id="fotoVeic"
                                  placeholder="http://exemplo.com/foto.jpg"
                                />
                              </div>

                              <div class="col-12">
                                <div class="d-grid mt-4">
                                  <button
                                    class="btn btn-primary btn-lg"
                                    type="button"
                                    id="btn-salvar-veiculo"
                                  >
                                    Cadastrar Veículo
                                  </button>
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div
        class="toast align-items-center badge text-bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
        id="toast-sucesso"
      >
        <div class="d-flex">
          <div class="toast-body fs-6">Veículo cadastrado com sucesso!</div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="app-form-veiculo.js"></script>
  </body>
</html>
