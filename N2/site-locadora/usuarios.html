<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Usuários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../estilo.css" />
</head>

<body>
    <header>
        <nav class="navbar mb-4">
            <div class="container-fluid justify-content-start">
                <a href="home.html"><button class="btn btn-outline-secondary me-2" type="button">Início</button></a>
                <a href="showroom.html"><button class="btn btn-outline-secondary me-2" type="button">Nossos
                        veículos</button></a>

                <button class="btn btn-success me-2" type="button">Gerenciar Usuários</button>

                <button class="btn btn-outline-danger ms-auto" type="button" id="btn-sair">Sair</button>
            </div>
        </nav>
    </header>

    <main class="container shadow-sm bg-white p-4 rounded">
        <div class="row mb-4 align-items-center">
            <div class="col">
                <h2><i class="bi bi-people me-2"></i>Gestão de Usuários</h2>
                <p class="text-muted">Administre os acessos do sistema</p>
            </div>
            <div class="col text-end">
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalUsuario">
                    <i class="bi bi-plus-circle me-2"></i>Novo Usuário
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Nome do Usuário</th>
                        <th scope="col">Login / Email</th>
                        <th scope="col">Nível de Acesso</th>
                        <th scope="col" class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody class="corpo_tabelaUsuario">
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="modalUsuario" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cadastrar Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form class="row g-3 validar" id="formulario_cadUsuario" novalidate>
                        <div class="col-md-12">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="cadastroNomeUsuario" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Login (E-mail)</label>
                            <input type="email" class="form-control" id="cadastroEmailUsuario" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Senha</label>
                            <input type="password" class="form-control" id="cadastroSenhaUsuario" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nível de Acesso</label>
                            <select class="form-select" id="cadastroNivelAcessoUsuario" required>
                                <option selected disabled value="">Selecione</option>
                                <option value="1">Administrador</option>
                                <option value="2">Funcionário</option>
                                <option value="3">Cliente</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" type="button" id="botao_cadUsuario">Salvar Usuário</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app-usuarios.js"></script>
</body>

</html>
