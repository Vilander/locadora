<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Painel Administrativo da Locadora" />
  <title>Admin - Locadora de Veículos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" />

  <link rel="stylesheet" href="../estilo.css" />
</head>

<body>
  <header>
    <nav class="navbar mb-3 p-2 navtop">
      <div id="nav-menu" class="container-fluid justify-content-start gap-2">
        <a href="usuarios.html">
          <button class="btn btn-outline-success" type="button">Área Adm</button>
        </a>
        <button class="btn btn-outline-secondary" type="button">
          Nossas lojas
        </button>
        <a href="showroom.html">
          <button class="btn btn-outline-secondary" type="button">
            Nossos veículos
          </button>
        </a>
        <a href="home.html">
          <button class="btn btn-outline-secondary" type="button">
            Início
          </button>
        </a>
      </div>
    </nav>
  </header>

  <div class="container-fluid">
    <div class="row">
      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block sidebar collapse" style="min-height: 100vh">
        <div class="position-sticky pt-3">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link active nav-veic" aria-current="page" href="#">
                <i class="bi bi-car-front me-2"></i>
                Veículos
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="bi bi-calendar-check me-2"></i>
                Agendamentos
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="bi bi-people me-2"></i>
                Usuários
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3">
          <h1 class="h2">Veículos Cadastrados</h1>
          <a href="cadastrarVeiculo.html" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Novo Veículo
          </a>
        </div>

        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th scope="col">FOTO</th>
                <th scope="col">ID</th>
                <th scope="col">MARCA</th>
                <th scope="col">MODELO</th>
                <th scope="col">PLACA</th>
                <th scope="col">CATEGORIA</th>
                <th scope="col">DIÁRIA (R$)</th>
                <th scope="col" class="text-center">AÇÕES</th>
              </tr>
            </thead>
            <tbody id="lista-veiculos"></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="app-admin-veiculos.js"></script>
</body>

</html>
